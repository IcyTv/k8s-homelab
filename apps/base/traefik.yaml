---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: flux-system
spec:
  dependsOn:
    - name: base
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: traefik
  interval: 10m0s
  path: ./apps/traefik
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: traefik
  serviceAccountName: traefik-sa
  timeout: 5m
